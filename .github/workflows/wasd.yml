name: Dispatcher
on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch blank.yml 5 times
        run: |
          for i in {1..5}
          do
            echo "Dispatching blank.yml run #$i at $(date)"
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/blank.yml/dispatches \
              -d '{"ref":"main"}' || echo "⚠️ Run #$i failed"
            sleep 3
          done
          echo "All 5 blank.yml runs dispatched."

      - name: Dispatch wasd.yml once
        run: |
          echo "Dispatching wasd.yml at $(date)"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/wasd.yml/dispatches \
            -d '{"ref":"main"}' || exit 1
          echo "wasd.yml dispatched successfully."